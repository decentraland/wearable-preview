name: Build and release

on:
  push:
    branches:
      - master
  release:
    types:
      - created

jobs:
  build-release:
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: set package.json version
        uses: decentraland/oddish-action@0074f2d535c43b5c83f136525304a6277166d77f
        with:
          deterministic-snapshot: true
          only-update-versions: true
      - name: Install
        run: npm ci --legacy-peer-deps
      - name: Build static-local
        run: npm run build:static-local
        env:
          NODE_OPTIONS: --max_old_space_size=8192
      - name: Build for CDN
        run: npm run build
        env:
          NODE_OPTIONS: --max_old_space_size=8192
      - name: Move static-local into main build
        run: mv ./static-local ./dist/static-local
      - name: Publish
        uses: decentraland/oddish-action@0074f2d535c43b5c83f136525304a6277166d77f
        with:
          cwd: './dist'
          deterministic-snapshot: true
          registry-url: 'https://registry.npmjs.org'
          access: public
          gitlab-token: ${{ secrets.GITLAB_CDN_DEPLOYER_TOKEN }}
          gitlab-pipeline-url: ${{ secrets.GITLAB_CDN_DEPLOYER_URL }}
      - name: Create Sentry release
        if: github.event_name == 'release' && github.event.action == 'created'
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
        with:
          sourcemaps: ${{ github.workspace }}/dist
          version: '${{ vars.SENTRY_RELEASE_PREFIX }}@${{ github.event.release.tag_name }}'
          url_prefix: '~'
